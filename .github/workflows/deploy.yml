name: Build & Deploy Hugo

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.232.121.61
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "public/*"
          target: "/var/www/portfolio/public"
          strip_components: 1
